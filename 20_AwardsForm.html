<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- INJECT MASTER STYLES AND MODAL SYSTEM -->
  <?!= include('01_UniversalModal'); ?>

  <style>
    /* ONLY APP-SPECIFIC STYLES HERE */
    .app-shell { display: flex; flex-direction: column; height: 100%; }
    
    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--teal-dark); padding: 12px 16px; border-radius: 12px; box-shadow: 0 4px 6px rgba(4, 51, 69, 0.15); }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; color: #ffffff; letter-spacing: 0.5px; }
    .brand svg { color: var(--teal); }

    .input-box { background: #ffffff; border: 1px solid var(--border); padding: 10px 14px; border-radius: 10px; display: flex; flex-direction: column; gap: 4px; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 20px; }
    .input-box:focus-within { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0, 182, 199, 0.15); }
    .input-box label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .input-box select { border: none; font-family: inherit; color: var(--text-main); font-size: 14px; font-weight: 600; outline: none; width: 100%; background: transparent; cursor: pointer; }

    .instruction { font-size: 12px; color: var(--text-muted); line-height: 1.5; font-weight: 500; margin-bottom: 10px; background: #ffffff; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }

    .action-bar { display: flex; gap: 10px; margin-top: auto; padding-top: 10px; }
    .btn-main { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: var(--teal); color: white; padding: 12px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0, 182, 199, 0.2); }
    .btn-main:hover { background: var(--teal-mid); transform: translateY(-1px); }
    .btn-main:disabled { background: #b0ced4; cursor: not-allowed; transform: none; box-shadow: none; }

    .error-text { color: var(--orange); font-size: 11px; font-weight: 700; margin-top: 10px; display: none; text-align: center; }

    .footer-container { position: relative; display: flex; justify-content: center; align-items: center; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .footer-tag { font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 0.5px; margin: 0; text-align: center; }
    .contact-support { position: absolute; right: 0; display: flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 800; color: var(--teal); text-decoration: none; transition: color 0.2s; letter-spacing: 0.5px; }
    .contact-support:hover { color: var(--teal-dark); }
    .contact-support svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="nav-bar">
    <div class="brand">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
      <span>AWARDS GENERATOR</span>
    </div>
  </div>

  <div class="instruction">Select a grading period below to extract data from the <b>CONSOL GRADE</b> sheet. The system will skip subjects with no qualifiers automatically.</div>

  <div class="input-box">
    <label>Target Grading Period</label>
    <select id="quarter">
      <option value="First Quarter">First Quarter (1Q)</option>
      <option value="Second Quarter">Second Quarter (2Q)</option>
      <option value="Third Quarter">Third Quarter (3Q)</option>
      <option value="Fourth Quarter">Fourth Quarter (4Q)</option>
    </select>
  </div>

  <div id="errorMsg" class="error-text"></div>

  <div class="action-bar">
    <button class="btn-main" id="generateBtn" onclick="initGenerate()">Generate Academic Awards PDF</button>
  </div>

<div class="footer-container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: auto; padding-top: 15px; padding-bottom: 5px; gap: 6px;">
    <div class="footer-tag" id="dynamicFooter" style="font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px;"></div>
    <a href="#" onclick="transitionToSupport()" style="font-size: 11px; font-weight: 800; color: var(--teal); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: 0.2s;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      CONTACT SUPPORT
    </a>
  </div>
</div>

<script>
// Load copyright footer immediately when the app opens
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('dynamicFooter').innerText = '© ' + new Date().getFullYear() + ' CLASSROOM TOOLS BY TEACHER MJ';
  });

  // Smooth transition to Support Desk
  function transitionToSupport() {
    const shell = document.querySelector('.app-shell');
    shell.style.transition = 'filter 0.3s ease';
    shell.style.filter = 'blur(5px)';
    
    setTimeout(() => {
      google.script.run.showSupportUI();
    }, 150);
  }

  // STEP 1: Start check
  function initGenerate() {
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    
    // Trigger Universal Loading Modal instead of changing button text
    showUniversalLoading("Validating Records", "Checking for existing PDF reports...");

    const quarter = document.getElementById('quarter').value;

    google.script.run
      .withSuccessHandler(handleDuplicateCheck)
      .withFailureHandler(handleError)
      .checkExistingReport(quarter);
  }

  // STEP 2: Handle response using UNIVERSAL MODAL
  function handleDuplicateCheck(res) {
    if (res.exists) {
      showUniversalWarning(
        "File Already Exists", 
        "A PDF report for this quarter has already been created. Do you want to rewrite it?", 
        "Rewrite File", 
        function() { executeGeneration(res.quarter, true); }
      );
      // Reset button text while waiting for user to click modal
      document.getElementById('generateBtn').innerText = 'Generate Academic Awards PDF';
      document.getElementById('generateBtn').disabled = false;
    } else {
      executeGeneration(res.quarter, false);
    }
  }

function executeGeneration(quarter, overwrite) {
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    
    // Show Premium Loader instead of button text
    showUniversalLoading("Generating Awards", "Extracting honors data and building your PDF certificate...");
    
    google.script.run
      .withSuccessHandler(function(url) {
        btn.disabled = false;
        
        // Pass the custom PDF button directly into the Universal Modal
        const customAction = `
          <a href="${url}" target="_blank" class="btn-modal-primary" style="text-decoration:none;" onclick="closeUniversalModal()">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="vertical-align:middle; margin-right:5px;"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Open PDF
          </a>
        `;
        showUniversalSuccess("Report Generated", "Your academic awards have been successfully saved to your Google Drive.", customAction);
      })
      .withFailureHandler(handleError)
      .generateAwardsPDF(quarter, overwrite);
  }

  // ERROR HANDLER
  function handleError(error) {
    const btn = document.getElementById('generateBtn');
    btn.innerText = 'Generate Academic Awards PDF';
    btn.disabled = false;
    
    // Use the Universal Warning for errors instead of raw text if preferred, 
    // but the inline error works fine for minor issues.
    showUniversalWarning("Generation Blocked", error.message, "Understood", () => {});
  }
</script>
</body>
</html>
