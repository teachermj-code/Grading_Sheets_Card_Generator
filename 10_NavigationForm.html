<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- INJECT MASTER STYLES AND MODAL SYSTEM -->
  <?!= include('01_UniversalModal'); ?>
  <?!= include('02_GlobalStyles'); ?>
  
<style>
    .app-shell { display: flex; flex-direction: column; height: 100%; overflow-y: auto; overflow-x: hidden; padding-right: 4px; }
    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--teal-dark); padding: 12px 16px; border-radius: 12px; box-shadow: 0 4px 6px rgba(4, 51, 69, 0.15); }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; color: #ffffff; letter-spacing: 0.5px; }
    .brand svg { color: var(--teal); }

    .instruction { font-size: 12px; color: var(--text-muted); line-height: 1.5; font-weight: 500; margin-bottom: 15px; background: #ffffff; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
    .btn-container { display: flex; flex-direction: column; gap: 12px; }
    
    .btn-nav { display: flex; align-items: center; justify-content: flex-start; gap: 15px; width: 100%; padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; transition: all 0.2s; text-align: left; }
    .btn-nav:hover { transform: translateX(5px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .btn-nav span { font-size: 10px; font-weight: 500; opacity: 0.9; display: block; margin-top: 2px; }

    .btn-init { background: #ffffff; border: 2px dashed var(--teal-dark); color: var(--teal-dark); margin-bottom: 8px; }
    .btn-init svg { color: var(--teal-dark); }
    .btn-summary { background: var(--green); color: white; }
    .btn-gwa { background: var(--orange); color: white; }
    
    /* Quarter Select Row Styling */
    .quarter-row { display: flex; gap: 8px; background: var(--teal); border-radius: 12px; padding: 4px; box-shadow: 0 4px 6px rgba(0, 182, 199, 0.2); }
    .quarter-select { background: rgba(255,255,255,0.2); color: white; border: none; outline: none; padding: 0 10px; font-weight: 700; border-radius: 8px; font-family: inherit; font-size: 13px; cursor: pointer; width: 110px; }
    .quarter-select option { color: #000; background: #fff; }
    .btn-active { background: transparent; color: white; padding: 12px; flex-grow: 1; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px; }
    .btn-active span { font-size: 10px; font-weight: 500; opacity: 0.9; display: block; margin-top: 2px; }
    .btn-active:hover { background: rgba(255,255,255,0.1); }

  </style>
</head>
<body>

<div class="app-shell">
  <div class="nav-bar">
    <div class="brand">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
      <span>WORKSPACE CONTROLS</span>
    </div>
  </div>

  <div class="instruction">Choose a view mode below to automatically show and hide the relevant tabs in your workbook. The <b>Learner's Name</b> sheet is always visible.</div>

  <div class="btn-container">
    <button class="btn-nav btn-init" onclick="initFlow()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
      <div>INITIALIZE WORKBOOK<span>Creates required Summary & GWA sheets</span></div>
    </button>

    <div class="quarter-row">
      <select id="quarterSelect" class="quarter-select">
        <option value="1Q">1st Qtr</option>
        <option value="2Q">2nd Qtr</option>
        <option value="3Q">3rd Qtr</option>
        <option value="4Q">4th Qtr</option>
      </select>
      <button class="btn-active" onclick="quarterFlow()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <div>VIEW QUARTER<span>Shows records for selected quarter</span></div>
      </button>
    </div>

    <button class="btn-nav btn-summary" onclick="viewFlow('SUMMARY', 'Subject Summaries')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
      <div>VIEW SUBJECT SUMMARY<span>Shows consolidated subject trends</span></div>
    </button>

    <button class="btn-nav btn-gwa" onclick="viewFlow('GWA', 'Final Grade (GWA)')">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
      <div>VIEW FINAL GRADE (GWA)<span>Shows year-end dashboard</span></div>
    </button>
  </div>

  <div class="footer-container" style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: auto; padding-top: 15px; padding-bottom: 5px; gap: 6px;">
    <div class="footer-tag" id="dynamicFooter" style="font-size: 10px; font-weight: 700; color: var(--text-muted); letter-spacing: 0.5px;"></div>
    <a href="#" onclick="transitionToSupport()" style="font-size: 11px; font-weight: 800; color: var(--teal); text-decoration: none; display: flex; align-items: center; gap: 4px; transition: 0.2s;">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      CONTACT SUPPORT
    </a>
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('dynamicFooter').innerText = '© ' + new Date().getFullYear() + ' CLASSROOM TOOLS BY TEACHER MJ';
  });

  function transitionToSupport() {
    const shell = document.querySelector('.app-shell');
    shell.style.transition = 'filter 0.3s ease';
    shell.style.filter = 'blur(5px)';
    setTimeout(() => { google.script.run.showSupportUI(); }, 150);
  }

  // FLOW 1: Initialization
  function initFlow() {
    showUniversalLoading("Checking Status", "Validating workbook structure...");
    google.script.run
      .withSuccessHandler(res => {
        const title = res.exists ? "Overwrite Summaries?" : "Initialize Workspace";
        const msg = res.exists 
          ? "Summary sheets already exist. Initializing will rebuild them. Proceed?"
          : "This will build your Subject Summaries and Final GWA sheets. Proceed?";
        
        showUniversalWarning(title, msg, "Initialize", () => {
          showUniversalLoading("Building Infrastructure", "Creating sheets and injecting formulas. Please wait...");
          google.script.run
            .withSuccessHandler(() => showUniversalSuccess("Initialization Complete", "All Summary & GWA sheets have been successfully created."))
            .withFailureHandler(err => showUniversalWarning("Initialization Failed", err.message, "Understood", () => {}))
            .initializeSummaries();
        });
      })
      .checkInitStatus();
  }

  // FLOW 2: View Quarter
  function quarterFlow() {
    const q = document.getElementById('quarterSelect').value;
    showUniversalWarning("Change View", `Display all sheets for ${q}? All other sheets will be hidden.`, "Show Quarter", () => {
      showUniversalLoading("Updating View", `Hiding inactive sheets and showing ${q} records...`);
      google.script.run
        .withSuccessHandler(() => showUniversalSuccess("View Updated", `You are now viewing ${q} records.`))
        .withFailureHandler(err => showUniversalWarning("View Blocked", err.message, "Understood", () => {}))
        .toggleViewMode(q);
    });
  }

  // FLOW 3: Summary and GWA
  function viewFlow(mode, displayName) {
    showUniversalWarning("Change View", `Switch workspace to view ${displayName}? Other sheets will be hidden.`, "Switch View", () => {
      showUniversalLoading("Updating View", `Isolating ${displayName} records...`);
      google.script.run
        .withSuccessHandler(() => showUniversalSuccess("View Updated", `You are now viewing ${displayName}.`))
        .withFailureHandler(err => showUniversalWarning("View Blocked", err.message, "Understood", () => {}))
        .toggleViewMode(mode);
    });
  }
</script>
</body>
</html>
