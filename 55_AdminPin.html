<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    /* Premium No-Scroll Reset */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #f4f7f6; font-family: 'Tahoma', sans-serif; color: #333;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .modal-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      text-align: center;
      width: 85%;
      box-sizing: border-box;
    }
    h2 { margin: 0 0 8px 0; color: #d32f2f; font-size: 18px; }
    p { font-size: 13px; color: #666; margin-bottom: 18px; }
    input[type="password"] {
      width: 100%;
      padding: 12px;
      font-size: 20px;
      text-align: center;
      letter-spacing: 6px;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 10px;
      outline: none;
      transition: border-color 0.3s;
      font-family: monospace;
    }
    input[type="password"]:focus { border-color: #d32f2f; }
    .error-msg { color: #d32f2f; font-size: 12px; height: 18px; margin-bottom: 10px; font-weight: bold; }
    .btn {
      background: #333; color: white; border: none; padding: 12px 20px;
      border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.3s; width: 100%;
      font-weight: bold;
    }
    .btn:hover { background: #555; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="modal-container">
    <h2>Admin Authorization</h2>
    <p>Enter developer PIN to bypass security.</p>
    
    <input type="password" id="pinInput" maxlength="10" placeholder="••••" autofocus>
    <div id="errorText" class="error-msg"></div>
    
    <button class="btn" id="submitBtn" onclick="submitPin()">Unlock System</button>
  </div>

  <script>
    document.getElementById("pinInput").addEventListener("keyup", function(event) {
      if (event.key === "Enter") submitPin();
    });

    function submitPin() {
      const pin = document.getElementById('pinInput').value;
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorText');
      
      if(!pin) return;
      
      btn.innerText = "Verifying...";
      btn.disabled = true;
      errorMsg.innerText = "";
      
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.success) {
            google.script.host.close(); 
          } else {
            errorMsg.innerText = response.message;
            btn.innerText = "Unlock System";
            btn.disabled = false;
            document.getElementById('pinInput').value = "";
            document.getElementById('pinInput').focus();
          }
        })
        .verifyAdminPin(pin);
    }
  </script>
</body>
</html>
