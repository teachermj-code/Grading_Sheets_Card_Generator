<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <!-- INJECT MASTER STYLES AND MODAL SYSTEM -->
  <?!= include('01_UniversalModal'); ?>

  <style>
    /* ONLY APP-SPECIFIC STYLES HERE */
    .app-shell { display: flex; flex-direction: column; height: 100%; transition: filter 0.2s; }
    
    .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--teal-dark); padding: 12px 16px; border-radius: 12px; box-shadow: 0 4px 6px rgba(4, 51, 69, 0.15); }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 16px; color: #ffffff; }
    .brand svg { color: var(--teal); }

    .btn-admin { background: transparent; border: 1px solid var(--orange); color: var(--orange); padding: 8px 14px; font-size: 11px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-admin:hover { background: var(--orange); color: #ffffff; }

    .control-panel { display: grid; grid-template-columns: 1.5fr 1fr; gap: 12px; margin-bottom: 20px; }
    .input-box { background: var(--card-bg); border: 1px solid var(--border); padding: 10px 14px; border-radius: 10px; display: flex; flex-direction: column; gap: 4px; transition: 0.2s; }
    .input-box:focus-within { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0, 182, 199, 0.15); }
    .input-box label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .input-box input, .input-box select { border: none; font-family: inherit; color: var(--text-main); font-size: 14px; font-weight: 600; outline: none; background: transparent; width: 100%; }

    .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex-grow: 1; margin-bottom: 20px; overflow-y: auto; }
    .subject-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; display: flex; align-items: center; justify-content: space-between; }
    .compulsory { background: #e5f1f3; border-style: dashed; }
    .subject-title { font-weight: 700; font-size: 11px; color: var(--text-main); }

    .toggle-group { display: flex; gap: 12px; }
    .toggle-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .toggle-item span { font-size: 9px; font-weight: 800; color: var(--text-muted); }
    input[type="checkbox"] { accent-color: var(--green); cursor: pointer; }

    .action-bar { display: flex; gap: 10px; margin-top: auto; padding-top: 10px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .btn-main { background: var(--teal); color: white; flex: 2; }
    .btn-main:disabled { background: #b0ced4; cursor: not-allowed; }
    .btn-outline { background: white; border: 2px solid var(--border); color: var(--text-main); flex: 1; }

    .footer-container { display: flex; justify-content: center; align-items: center; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px; }
    .footer-tag { font-size: 10px; color: var(--text-muted); font-weight: 700; }
  </style>
</head>
<body>

<div class="app-shell" id="appShell">
  <div class="nav-bar">
    <div class="brand">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      <span>CLASS RECORD MANAGER</span>
    </div>
    <button class="btn-admin" onclick="triggerMasterReset()">MASTER RESET</button>
  </div>

  <div class="control-panel">
    <div class="input-box" id="gradeSectionBox">
      <label>Grade & Section</label>
      <input type="text" id="gradeSection" placeholder="E.G. 6 - TAUSUG" oninput="validateForm()">
    </div>
    <div class="input-box">
      <label>Active Quarter</label>
      <select id="quarter">
        <option>First Quarter</option><option>Second Quarter</option>
        <option>Third Quarter</option><option>Fourth Quarter</option>
      </select>
    </div>
  </div>

  <div class="grid-container" id="subjectRows">
    <!-- Compulsory Sheets -->
    <div class="subject-card compulsory"><div class="subject-title">HOMEROOM GUIDANCE</div><div class="toggle-group"><div class="toggle-item"><span>INC</span><input type="checkbox" checked disabled></div></div></div>
    <div class="subject-card compulsory"><div class="subject-title">HRG LETTER GRADE</div><div class="toggle-group"><div class="toggle-item"><span>INC</span><input type="checkbox" checked disabled></div></div></div>
    <div class="subject-card compulsory"><div class="subject-title">CONSOL GRADE</div><div class="toggle-group"><div class="toggle-item"><span>INC</span><input type="checkbox" checked disabled></div></div></div>
  </div>

  <div class="action-bar">
    <button class="btn btn-outline" onclick="triggerConfirmDelete()">Clear Quarter</button>
    <button class="btn btn-main" id="submitBtn" onclick="submitBatch()" disabled>Generate Grading Sheets</button>
  </div>

<div class="footer-container" style="position: relative; padding-bottom: 15px;">
    <div class="footer-tag" id="dynamicFooter"></div>
    <a href="support.html" target="_blank" class="btn-admin" style="position: absolute; right: 0; bottom: 10px; text-decoration: none; display: flex; align-items: center; gap: 5px; border-color: var(--teal); color: var(--teal);">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
      PREMIUM SUPPORT
    </a>
  </div>
</div>

<script>
// Set copyright from global standard
  document.getElementById('dynamicFooter').innerText = '© ' + new Date().getFullYear() + ' CLASSROOM TOOLS BY TEACHER MJ';

// Auto-Fetch Existing Grade & Section and Lock it
  google.script.run.withSuccessHandler(function(gs) {
    if (gs) {
      const gsInput = document.getElementById('gradeSection');
      gsInput.value = gs;
      gsInput.disabled = true; // Lock the input
      gsInput.parentElement.style.background = "#f8fafc"; // Visual indicator it is locked
      validateForm(); // Instantly validate so button unlocks
    }
  }).getExistingGradeSection();

  // Load dynamic subjects via utility function
  google.script.run.withSuccessHandler(function(subjects) {
    const container = document.getElementById('subjectRows');
    subjects.forEach((sub) => {
      const card = document.createElement('div');
      card.className = 'subject-card';
      card.innerHTML = `<div class="subject-title">${sub}</div><div class="toggle-group"><div class="toggle-item"><span>INC</span><input type="checkbox" class="include-cb" data-sub="${sub}" checked></div><div class="toggle-item"><span>EXM</span><input type="checkbox" class="exam-cb" checked></div></div>`;
      container.appendChild(card);
    });
  }).getSubjectList();

  function validateForm() {
    const val = document.getElementById('gradeSection').value.trim();
    const btn = document.getElementById('submitBtn');
    const box = document.getElementById('gradeSectionBox');
    const smartPattern = /^\d+\s-\s[A-Z]/; // Matches "6 - T"
    
    if (smartPattern.test(val)) {
      btn.disabled = false;
      box.style.borderColor = "var(--teal)";
    } else {
      btn.disabled = true;
      box.style.borderColor = "var(--border)";
    }
  }

function triggerMasterReset() {
    showUniversalWarning(
      "Master Reset", 
      "Erase all students' records? This cannot be undone.", 
      "Reset All", 
      function() {
        showUniversalLoading("Master Reset in Progress", "Erasing all student records. Please wait...");
        // Force browser to paint the loading UI before calling the server
        setTimeout(() => {
          google.script.run
            .withSuccessHandler(msg => showUniversalSuccess("Reset Complete", msg))
            .withFailureHandler(err => showUniversalWarning("Reset Failed", err.message, "Understood", () => {}))
            .resetSpreadsheet();
        }, 150);
      }
    );
  }

  function triggerConfirmDelete() {
    const q = document.getElementById('quarter').value;
    showUniversalWarning(
      "Clear Quarter", 
      `Delete all students' records for ${q}?`, 
      "Clear Data", 
      function() {
        showUniversalLoading("Clearing Quarter", `Deleting sheets for ${q}. Please wait...`);
        // Force browser to paint the loading UI before calling the server
        setTimeout(() => {
          google.script.run
            .withSuccessHandler(msg => showUniversalSuccess("Quarter Cleared", msg))
            .withFailureHandler(err => showUniversalWarning("Clear Failed", err.message, "Understood", () => {}))
            .deleteQuarterSheets(q);
        }, 150);
      }
    );
  }

function submitBatch() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; 
    btn.innerText = 'Checking Sequence...';
    
    // Show loading modal immediately
    showUniversalLoading("Validating Setup", "Checking quarter sequence...");

    const quarter = document.getElementById('quarter').value;

    // STEP 1: Sequence Check
    google.script.run
      .withSuccessHandler(res => {
        if (!res.allowed) {
          btn.disabled = false; btn.innerText = 'Generate Grading Sheets';
          showUniversalWarning("Generation Blocked", res.msg, "Understood", () => {});
        } else if (res.needsConfirm) {
          btn.disabled = false; btn.innerText = 'Generate Grading Sheets';
          showUniversalWarning("Lock Previous Quarter", res.msg, "Lock & Proceed", function() {
            executePremiumGeneration(quarter, res.prevPrefix, res.prevName);
          });
        } else {
          executePremiumGeneration(quarter, null, null);
        }
      })
      .checkSequence(quarter);
  }

function executePremiumGeneration(targetQuarter, prevPrefix, prevName) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    const selections = [];
    document.querySelectorAll('.include-cb').forEach(cb => {
      if (cb.checked) selections.push({ subject: cb.getAttribute('data-sub'), hasExam: cb.closest('.subject-card').querySelector('.exam-cb').checked });
    });
    const data = { gradeSection: document.getElementById('gradeSection').value, quarter: targetQuarter, selections: selections };

    if (prevPrefix) {
      btn.innerText = `Hiding & Locking ${prevName} sheets...`;
      showUniversalLoading("Securing Records", `Hiding & Locking ${prevName} sheets for security...`);
      
      // Delay server call by 150ms so the loading SVG animation can render on screen
      setTimeout(() => {
        google.script.run
          .withSuccessHandler(() => { triggerSheetCreation(btn, data, targetQuarter); })
          .performArchiveStep(prevPrefix);
      }, 150);
      
    } else {
      triggerSheetCreation(btn, data, targetQuarter);
    }
  }

  function triggerSheetCreation(btn, data, targetQuarter) {
    // STEP 3: Generate Current Quarter
    btn.innerText = `Creating ${targetQuarter} Grading Sheets...`;
    showUniversalLoading("Generating Sheets", `Creating ${targetQuarter} grading sheets. This may take a moment...`);
    
    google.script.run
      .withSuccessHandler(() => {
        const customAction = `<button class="btn-modal-primary" onclick="google.script.host.close()">Close App</button>`;
        showUniversalSuccess("Records Generated", "Class records and formulas configured for students.", customAction);
      })
      .withFailureHandler(err => {
        btn.disabled = false; btn.innerText = 'Generate Grading Sheets';
        showUniversalWarning("Generation Blocked", err.message, "Understood", () => {});
      })
      .processBatchForm(data);
  }
  
</script>
</body>
</html>
