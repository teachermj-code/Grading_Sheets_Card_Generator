<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    /* Premium No-Scroll Reset */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #f4f7f6; font-family: 'Tahoma', sans-serif; color: #333;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .modal-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      text-align: center;
      width: 85%;
      box-sizing: border-box;
    }
    .icon { font-size: 36px; margin-bottom: 10px; }
    h2 { margin: 0 0 8px 0; color: #2e7d32; font-size: 20px; }
    p { font-size: 13px; color: #555; margin-bottom: 20px; line-height: 1.4; }
    .btn {
      background: #333; color: white; border: none; padding: 12px 20px;
      border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.3s; width: 100%;
      font-weight: bold;
    }
    .btn:hover { background: #555; }
  </style>
</head>
<body>

  <div class="modal-container">
    <div class="icon">🔒</div>
    <h2>System Secured</h2>
    <p>Admin Mode has been successfully disabled. All core templates are now hidden and protected.</p>
    
    <button class="btn" onclick="google.script.host.close()">Acknowledge</button>
  </div>

</body>
</html>
